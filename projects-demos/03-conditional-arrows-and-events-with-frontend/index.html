<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>JS Practice</title>
  </head>
  <body>
    <h1>// js practice</h1>

    <!-- 1. isOldEnough -->
    <div class="section">
      <h2>1. isOldEnough</h2>
      <input type="number" id="age-input" placeholder="Enter age" />
      <button id="age-btn">check</button>
      <p class="result" id="age-result"></p>
    </div>

    <!-- 2. isRaining -->
    <div class="section">
      <h2>2. isRaining</h2>
      <select id="weather-input">
        <option value="#" disabled selected>Select current condition...</option>
        <option value="true">raining</option>
        <option value="false">not raining</option>
      </select>
      <button id="rain-btn">check</button>
      <p class="result" id="rain-result"></p>
    </div>

    <!-- 3. isEven -->
    <div class="section">
      <h2>3. isEven</h2>
      <input type="number" id="number-input" placeholder="Enter a number" />
      <button id="even-btn">check</button>
      <p class="result" id="even-result"></p>
    </div>

    <!-- 4. isGreater -->
    <div class="section">
      <h2>4. isGreater</h2>
      <input type="number" id="num1-input" placeholder="First number" />
      <input type="number" id="num2-input" placeholder="Second number" />
      <button id="greater-btn">check</button>
      <p class="result" id="greater-result"></p>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
